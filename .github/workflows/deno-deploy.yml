name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@codex/deno-2-programmatic
    with:
      project: health-ubq-fi
      deploy_platform: deno2
      entrypoint: src/server/index.ts
      install_command: deno install
      build_command: deno task build
      include: |
        src/**
      index_html_path: src/client/dashboard/index.html
      extra_paths: |
        /api/apps
      debug_fetch_fail: true
      required_env: |
        DENO_DEPLOY_TOKEN
    secrets: inherit
